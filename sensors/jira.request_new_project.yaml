---
class_name: JiraIssueSensor
entry_point: src/jira_issue_sensor.py
description: Search for new JIRA issues
poll_interval: 600
enabled: true
trigger_types:
  - name: "jira.request_new_project"
    description: "Triggers when there is a new JIRA issue requesting the creation of a new OpenStack project"
    payload_schema:
      type: "object"
      properties:
        issue_key:
          type: "string"
          description: "unique ID to identify the JIRA Issue triggering this automation"
        project_name:
          type: "string"
          description: "foo"
        users:
          type: "string"
          description: "foo"
        cpus:
          type: "string"
          description: "foo"
        memory:
          type: "string"
          description: "foo"
        shared_storage:
          type: "string"
          description: "foo"
        object_storage:
          type: "string"
          description: "foo"
        gpus:
          type: "string"
          description: "foo"
        contact_email:
          type: "string"
          description: "foo"
